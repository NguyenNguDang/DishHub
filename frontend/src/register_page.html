<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f27f0d",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 px-6 md:px-10 py-4 bg-white dark:bg-background-dark">
<div class="flex items-center gap-2 text-primary">
<div class="size-8 flex items-center justify-center">
<span class="material-symbols-outlined text-3xl font-bold">restaurant_menu</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-[-0.015em]">FoodieApp</h2>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-4 md:p-8">
<div class="w-full max-w-[480px] flex flex-col gap-8">
<!-- Hero Image Placeholder -->
<div class="@container">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-primary/5 rounded-xl min-h-[180px] border border-primary/10" data-alt="A delicious spread of gourmet food on a wooden table" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDN5jXp0FKx8chVQR7Qs4rHWgVzNzmPrXSvvK0e5UHX_2g5tRyE5214lDpTa3Qoi7OMrdvVFoMYrVklYtAuzproRfJTv2ZZjw2bNhQ5EHfLJAEZwkLNL7V8GyfAWxKiDVRlDJTdwpxWOfsoWJ_qtONCEfPyZNKkNdkTSwIhDl62MRBpxSGZojGc50Nya-DEtGC83NSQ7IPpRTt0gJLNhRE7oYT2qcsWCA9DkDTi7hYGuk4wW_jrmsc-Ap7eoJYuDsXBCNSQIPeouqV2");'>
</div>
</div>
<!-- Form Header -->
<div class="flex flex-col gap-2">
<h1 class="text-slate-900 dark:text-slate-100 text-4xl font-bold leading-tight">Create your account</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal">Join our community of food lovers today.</p>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-5" onsubmit="return false;">
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">First Name</span>
<input class="form-input flex w-full rounded-lg border border-primary/20 bg-white dark:bg-background-dark/50 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-base transition-all" placeholder="John" type="text"/>
</label>
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Last Name</span>
<input class="form-input flex w-full rounded-lg border border-primary/20 bg-white dark:bg-background-dark/50 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-base transition-all" placeholder="Doe" type="text"/>
</label>
</div>
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Email</span>
<input class="form-input flex w-full rounded-lg border border-primary/20 bg-white dark:bg-background-dark/50 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-base transition-all" placeholder="example@email.com" type="email"/>
</label>
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Password</span>
<div class="relative">
<input class="form-input flex w-full rounded-lg border border-primary/20 bg-white dark:bg-background-dark/50 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-base transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</label>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-12 rounded-lg transition-colors shadow-lg shadow-primary/20 mt-2" type="submit">
                        Sign Up
                    </button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-primary/10"></div>
<span class="flex-shrink mx-4 text-slate-400 text-sm">or</span>
<div class="flex-grow border-t border-primary/10"></div>
</div>
<button class="w-full flex items-center justify-center gap-3 border border-primary/20 bg-white dark:bg-background-dark/50 hover:bg-primary/5 text-slate-900 dark:text-slate-100 font-semibold h-12 rounded-lg transition-all" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Continue with Google
                    </button>
</form>
<div class="text-center pt-4">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                        Already have an account? 
                        <a class="text-primary font-bold hover:underline" href="#">Log in</a>
</p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="p-6 text-center text-slate-400 text-xs">
<p>© 2024 FoodieApp Inc. All rights reserved.</p>
</footer>
</div>
</body></html>
